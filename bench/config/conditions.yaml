# Benchmark conditions — each defines how the agent accesses GitHub

conditions:
  cli:
    name: "gh CLI (raw)"
    tool: gh
    agents_md: |
      # Tools

      You have the `gh` CLI installed. Use it for all GitHub operations.
      Run `gh <command> --help` to discover subcommands and flags.

      Examples:
      - `gh issue list --repo owner/repo`
      - `gh pr view 123 --repo owner/repo`
      - `gh release list --repo owner/repo`

  axi:
    name: "gh-axi (AXI wrapper)"
    tool: gh-axi
    agents_md: |
      # Tools

      You have `gh-axi` installed for GitHub operations. The `gh` CLI is not
      available — use `gh-axi` for all GitHub commands. It has the same
      subcommands and flags as `gh` but provides structured output with
      pre-computed summaries (counts, check results).

      Examples:
      - `gh-axi issue list --repo owner/repo`
      - `gh-axi pr view 123 --repo owner/repo`
      - `gh-axi release list --repo owner/repo`

  mcp-with-toolsearch:
    name: "GitHub MCP server (with ToolSearch)"
    tool: mcp
    agents_md: |
      # Tools

      You have a GitHub MCP server registered with tools for GitHub operations.
      Use the available MCP tools to interact with GitHub.
      The tools follow standard GitHub API patterns.

      IMPORTANT: Do NOT use the `gh` CLI or `curl` to call the GitHub API.
      You must use the MCP tools exclusively for all GitHub operations.
    setup_commands:
      - "codex mcp add github --url https://api.githubcopilot.com/mcp/ --bearer-token-env-var GH_TOKEN"

  mcp-no-toolsearch:
    name: "GitHub MCP (no ToolSearch)"
    tool: mcp
    agents_md: |
      # Tools

      You have a GitHub MCP server registered with tools for GitHub operations.
      Use the available MCP tools to interact with GitHub.
      The tools follow standard GitHub API patterns.

      IMPORTANT: Do NOT use the `gh` CLI or `curl` to call the GitHub API.
      You must use the MCP tools exclusively for all GitHub operations.
    setup_commands:
      - "codex mcp add github --url https://api.githubcopilot.com/mcp/ --bearer-token-env-var GH_TOKEN"

  mcp-with-code-mode:
    name: "Code execution (gh wrappers)"
    tool: code
    agents_md: |
      # Tools

      You have a TypeScript library at `./gh-code/` that wraps GitHub operations
      as typed functions. Use it by writing a `.ts` script and running it with `npx tsx`.

      IMPORTANT: Do NOT use the `gh` CLI or `curl` to call the GitHub API directly.
      You must use the `./gh-code/` library exclusively for all GitHub operations.

      ## Available modules

      - `./gh-code/issues` — listIssues, viewIssue, listComments
      - `./gh-code/prs` — viewPR, listChecks
      - `./gh-code/releases` — listReleases, viewRelease
      - `./gh-code/repo` — viewRepo
      - `./gh-code/labels` — listLabels
      - `./gh-code/runs` — listRuns, viewRun

      ## Usage pattern

      Write a TypeScript file, then run it:

      ```ts
      import { listIssues } from "./gh-code/issues";
      const issues = listIssues("openclaw/openclaw", { state: "open", limit: 5 });
      console.log(JSON.stringify(issues, null, 2));
      ```

      Then execute: `npx tsx script.ts`

      You can compose multiple operations in a single script to minimize round trips.
      Filter and process data in code before logging results.

  mcp-compressed-low:
    name: "GitHub MCP (compressed-low)"
    tool: mcp-compressed
    mcp_compressor:
      level: low
      server_name: github
    agents_md: |
      # Tools

      You have a compressed GitHub MCP server with wrapper tools prefixed `github_`.
      Full tool descriptions are visible — browse them and call `github_invoke_tool`
      directly.

      Available wrapper tools:
      - `github_list_tools` — list all available GitHub tools
      - `github_get_tool_schema` — get full JSON schema for a specific tool
      - `github_invoke_tool` — call a GitHub tool by name with arguments

      At low compression, descriptions are fully visible so you can often call
      `github_invoke_tool` directly without first calling `github_get_tool_schema`.

      IMPORTANT: Do NOT use the `gh` CLI or `curl` to call the GitHub API.
      You must use the wrapper tools exclusively for all GitHub operations.

  mcp-compressed-medium:
    name: "GitHub MCP (compressed-medium)"
    tool: mcp-compressed
    mcp_compressor:
      level: medium
      server_name: github
    agents_md: |
      # Tools

      You have a compressed GitHub MCP server with wrapper tools prefixed `github_`.
      Only the first sentence of each tool description is visible.

      Available wrapper tools:
      - `github_list_tools` — list all available GitHub tools
      - `github_get_tool_schema` — get full JSON schema for a specific tool
      - `github_invoke_tool` — call a GitHub tool by name with arguments

      Workflow: browse tool names, call `github_get_tool_schema` for any tool you
      want to use to see its full schema and parameters, then call
      `github_invoke_tool` with the tool name and arguments.

      IMPORTANT: Do NOT use the `gh` CLI or `curl` to call the GitHub API.
      You must use the wrapper tools exclusively for all GitHub operations.

  mcp-compressed-high:
    name: "GitHub MCP (compressed-high)"
    tool: mcp-compressed
    mcp_compressor:
      level: high
      server_name: github
    agents_md: |
      # Tools

      You have a compressed GitHub MCP server with wrapper tools prefixed `github_`.
      Only tool and parameter names are visible (no descriptions).

      Available wrapper tools:
      - `github_list_tools` — list all available GitHub tools
      - `github_get_tool_schema` — get full JSON schema for a specific tool
      - `github_invoke_tool` — call a GitHub tool by name with arguments

      Workflow: you MUST call `github_get_tool_schema` before invoking any tool,
      because descriptions are stripped. Then call `github_invoke_tool` with the
      tool name and arguments.

      IMPORTANT: Do NOT use the `gh` CLI or `curl` to call the GitHub API.
      You must use the wrapper tools exclusively for all GitHub operations.

  mcp-compressed-max:
    name: "GitHub MCP (compressed-max)"
    tool: mcp-compressed
    mcp_compressor:
      level: max
      server_name: github
    agents_md: |
      # Tools

      You have a compressed GitHub MCP server with wrapper tools prefixed `github_`.
      Nothing is loaded upfront — you must discover tools at runtime.

      Available wrapper tools:
      - `github_list_tools` — list all available GitHub tools
      - `github_get_tool_schema` — get full JSON schema for a specific tool
      - `github_invoke_tool` — call a GitHub tool by name with arguments

      Workflow:
      1. Call `github_list_tools()` to discover available tools
      2. Call `github_get_tool_schema(tool_name)` to get the full schema
      3. Call `github_invoke_tool(tool_name, arguments)` to execute

      You MUST follow this sequence — no tool information is available without
      calling `github_list_tools` first.

      IMPORTANT: Do NOT use the `gh` CLI or `curl` to call the GitHub API.
      You must use the wrapper tools exclusively for all GitHub operations.
